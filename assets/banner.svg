<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Foka AI — Community Moderation and Support for Solana">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#141c33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14F195"/>
      <stop offset="1" stop-color="#9945FF"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2440"/>
      <stop offset="1" stop-color="#0e1526"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#14F195" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#14F195" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" rx="22" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" rx="3" fill="url(#accent)"/>
  <rect x="0" y="294" width="1200" height="6" rx="3" fill="url(#accent)"/>

  <!-- safe-chat emblem: a community speech bubble with a verified check -->
  <circle cx="156" cy="150" r="118" fill="url(#glow)"/>
  <g transform="translate(86,84)">
    <path d="M24 2 H116 C130 2 140 12 140 26 V78 C140 92 130 102 116 102 H56 L34 128 L46 102 H24 C10 102 0 92 0 78 V26 C0 12 10 2 24 2 Z"
          fill="url(#shield)" stroke="url(#accent)" stroke-width="3.5"/>
    <path d="M40 52 L62 74 L100 32" fill="none" stroke="url(#accent)"
          stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="300" y="118" fill="#ffffff" font-size="62" font-weight="800">Foka AI</text>
    <text x="303" y="162" fill="#a7b8d6" font-size="29" font-weight="600">Community Moderation &amp; Support · Solana</text>
    <text x="303" y="200" fill="#6f82a6" font-size="21">Anti-scam moderation, member support &amp; community ops for Telegram + Discord.</text>
    <text x="303" y="244" fill="#8aa0c8" font-size="18.5" font-weight="600">10 languages · evasion-resistant · immunity · audit log · ticketing · MCP · 240 tests · MIT</text>
  </g>
</svg>
