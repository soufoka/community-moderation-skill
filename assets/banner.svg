  <rect width="1200" height="300" rx="22" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" rx="3" fill="url(#accent)"/>
  <rect x="0" y="294" width="1200" height="6" rx="3" fill="url(#accent)"/>

